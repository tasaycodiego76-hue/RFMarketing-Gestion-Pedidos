version: '3.8'

services:
  # Servicio de la aplicación web (PHP Apache)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfmarketing_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - CI_ENVIRONMENT=production
      # Mapeo de variables de entorno para la base de datos PostgreSQL
      - database.default.hostname=db
      - database.default.database=db_rfmarketing
      - database.default.username=postgres
      - database.default.password=NaviCat06_PI2610_Secure
      - database.default.DBDriver=Postgre
      - database.default.port=5432
      # Pusher (si los necesitas en producción, se heredan del host o se definen aquí)
      - PUSHER_APP_ID=2156424
      - PUSHER_KEY=1b4cf26bb870153e30b6
      - PUSHER_SECRET=5210e876a0d7b2a35620
      - PUSHER_CLUSTER=us2
    volumes:
      # Volumen persistente para imágenes y archivos subidos por los usuarios
      - uploads_data:/var/www/html/public/uploads
      # Volumen persistente para logs, caché y sesiones
      - writable_data:/var/www/html/writable

  # Servicio de Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: rfmarketing_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: db_rfmarketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NaviCat06_PI2610_Secure
    volumes:
      # Volumen persistente para la base de datos PostgreSQL
      - pgdata:/var/lib/postgresql/data

volumes:
  uploads_data:
  writable_data:
  pgdata:
